<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellington Lira</title>
</head>
<body>
    

    <section class="contact-section">
        <p class="contact-text">
            Você pode falar comigo pelo email
            <a href="mailto:dnllira1@gmail.com.br">dnllira1@gmail.com.br</a>
            ou usar o formulário abaixo.
        </p>

        <form id="contact-form" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="Your email Address" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea name="message" id="message" placeholder="Your message" itemid="message"></textarea>
            </div>

            <button class="submit-btn" type="submit">Submit</button>
            <div class="feedback" id="feedback"></div>
        </form>
    </section>
</body>
</html>
